<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Bandar | Tactical DNA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .gradient-text { background: linear-gradient(180deg, #fff 30%, #f97316 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .pitch-full { background: #080808; border: 2px solid #1a1a1a; border-radius: 20px; position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; }
        .heatmap-zone { position: absolute; background: radial-gradient(circle, rgba(249,115,22,0.4) 0%, transparent 75%); border-radius: 50%; filter: blur(30px); animation: pulse 4s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.2); } }
        .bento-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 30px; transition: 0.4s; }
    </style>
</head>
<body>
    <nav class="fixed top-0 w-full z-50 px-10 py-6 flex justify-between items-center backdrop-blur-md">
        <a href="index.html" class="text-[10px] font-black uppercase tracking-[0.4em] text-orange-500 hover:text-white transition">← BACK TO SYSTEM</a>
        <div class="text-[9px] font-black tracking-widest text-zinc-600 uppercase">Ahmad Bandar // Scouting Report</div>
    </nav>

    <section class="min-h-screen flex flex-col justify-center items-center px-10 pt-20">
        <div class="text-center" data-aos="fade-down">
            <h1 class="text-6xl md:text-8xl font-black uppercase italic gradient-text tracking-tighter">Tactical DNA</h1>
            <p class="mt-4 text-zinc-500 tracking-[0.6em] text-[10px] uppercase">Mapping Intelligence on the Pitch</p>
        </div>

        <div class="max-w-6xl w-full mt-20" data-aos="zoom-in">
            <div class="pitch-full">
                <div class="absolute left-1/2 top-0 bottom-0 w-[1px] bg-white/5"></div>
                <div class="heatmap-zone w-64 h-64 top-1/4 left-1/2"></div>
                <div class="absolute bottom-6 left-8 flex items-center gap-3">
                    <span class="w-2 h-2 bg-orange-500 rounded-full animate-ping"></span>
                    <span class="text-[9px] font-black uppercase text-zinc-400">Deep Lying Playmaker Analysis</span>
                </div>
            </div>
        </div>
    </section>

    <section class="py-32 px-10">
        <div class="max-w-6xl mx-auto grid md:grid-cols-3 gap-6">
            <div class="bento-card md:col-span-2">
                <h3 class="text-xs font-black text-orange-500 uppercase mb-10">Technical Mastery</h3>
                <div class="space-y-6 text-[10px] font-black uppercase">
                    <div>Passing Accuracy <div class="h-1 bg-zinc-800 mt-2"><div class="h-full bg-orange-500 w-[92%]"></div></div></div>
                    <div>Vision <div class="h-1 bg-zinc-800 mt-2"><div class="h-full bg-orange-500 w-[96%]"></div></div></div>
                </div>
            </div>
            <div class="bento-card text-center flex flex-col justify-center">
                <div class="text-4xl font-black text-orange-500 italic">88</div>
                <div class="text-[10px] text-zinc-500 uppercase mt-2">Overall Rating</div>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000 });</script>
</body>
</html>
