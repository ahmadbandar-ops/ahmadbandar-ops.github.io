<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Bandar | Football DNA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gradient-text { background: linear-gradient(180deg, #fff 30%, #f97316 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* FOOTBALL BACKGROUND IMAGE */
        .hero-bg {
            position: fixed;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2000'); /* Soura mratabe lal pitch */
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            z-index: -1;
        }

        .football-card { 
            background: rgba(255,255,255,0.03); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 24px; 
            padding: 30px; 
            transition: 0.4s; 
        }
        .football-card:hover { border-color: #f97316; background: rgba(249,115,22,0.05); transform: translateY(-5px); }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <header class="fixed top-0 w-full z-[110] px-2 md:px-6 py-3 md:py-4 flex justify-between items-center bg-black/60 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-1 md:gap-4">
            <span id="live-clock" class="text-white font-black tracking-tighter text-[8px] md:text-[11px]">00:00:00</span>
            <span class="text-zinc-800">|</span>
            <div class="flex gap-[1px] items-end h-2 md:h-3">
                <div class="w-[1.5px] h-[30%] bg-white/20"></div>
                <div class="w-[1.5px] h-[60%] bg-orange-500"></div>
                <div class="w-[1.5px] h-[100%] bg-orange-500"></div>
            </div>
        </div>
        <nav class="flex items-center gap-1.5 md:gap-4 uppercase font-black text-[6.5px] md:text-[9px] tracking-tight text-zinc-400">
            <a href="index.html" class="hover:text-orange-500 transition px-1">Index</a>
            <a href="personal.html" class="hover:text-orange-500 transition px-1">Profile</a>
            <a href="lab.html" class="hover:text-orange-500 transition px-1">Lab</a>
            <a href="index2.html" class="text-white bg-orange-500 border border-orange-500/40 px-2 py-0.5 md:px-3 md:py-1 rounded-sm shadow-[0_0_10px_rgba(249,115,22,0.3)]">FOOTBALL</a>
        </nav>
        <div class="flex items-center gap-1 border-l border-white/10 pl-2">
            <span class="text-[6px] md:text-[9px] font-bold text-zinc-500">98%</span>
            <div class="w-4 h-2 md:w-6 md:h-3 border border-white/30 rounded-[1px] p-[0.5px] relative">
                <div class="h-full bg-green-500 w-[90%] rounded-[0.5px]"></div>
                <div class="absolute -right-[2px] top-1/2 -translate-y-1/2 w-[1.5px] h-0.5 bg-white/30 rounded-r-sm"></div>
            </div>
        </div>
    </header>

    <main class="pt-32 px-6 max-w-6xl mx-auto min-h-screen pb-20">
        <div class="mb-12" data-aos="fade-up">
            <h1 class="text-6xl md:text-8xl font-black uppercase italic gradient-text tracking-tighter leading-none">Football DNA</h1>
            <p class="mt-4 text-zinc-500 tracking-[0.6em] text-[10px] uppercase font-bold italic">Athlete // Tactician // Coach</p>
        </div>

        <div class="grid md:grid-cols-3 gap-6 mb-12">
            <div class="football-card" data-aos="fade-up">
                <h3 class="text-orange-500 text-[10px] font-black uppercase italic mb-4">Positioning</h3>
                <h2 class="text-3xl font-black italic mb-4 uppercase">The Midfield</h2>
                <p class="text-zinc-500 text-sm italic leading-relaxed">Spatial control and transitions.</p>
            </div>
            <div class="football-card" data-aos="fade-up" data-aos-delay="100">
                <h3 class="text-orange-500 text-[10px] font-black uppercase italic mb-4">Career</h3>
                <h2 class="text-3xl font-black italic mb-4 uppercase">Coaching</h2>
                <p class="text-zinc-500 text-sm italic leading-relaxed">Tactical framework development.</p>
            </div>
            <div class="football-card" data-aos="fade-up" data-aos-delay="200">
                <h3 class="text-orange-500 text-[10px] font-black uppercase italic mb-4">Status</h3>
                <h2 class="text-3xl font-black italic mb-4 uppercase">99% Ready</h2>
                <div class="w-full bg-white/5 h-1 mt-4"><div class="bg-orange-500 h-full w-[99%]"></div></div>
            </div>
        </div>

        <div class="football-card border-orange-500/20" data-aos="fade-up">
            <h2 class="text-2xl font-black uppercase italic mb-6">Tactical Analysis Hub</h2>
            <div class="flex gap-4">
                <div class="bg-white/5 p-4 rounded-xl border border-white/5">
                    <span class="text-orange-500 font-black text-xl italic">4-3-3</span>
                    <p class="text-[8px] text-zinc-500 uppercase font-bold tracking-widest mt-1">Attacking Formation</p>
                </div>
                <div class="bg-white/5 p-4 rounded-xl border border-white/5">
                    <span class="text-orange-500 font-black text-xl italic">3-5-2</span>
                    <p class="text-[8px] text-zinc-500 uppercase font-bold tracking-widest mt-1">Counter System</p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').textContent = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0') + ":" + now.getSeconds().toString().padStart(2,'0');
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
