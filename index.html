<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Bandar | Professional Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background-color: #000; color: white; scroll-behavior: smooth; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* 1. Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }

        /* 2. Loader */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease-out;
        }

        /* 3. Animated Gradient Text */
        .gradient-text {
            background: linear-gradient(90deg, #fff, #f97316, #fff);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            animation: gradient-move 3s linear infinite;
        }
        @keyframes gradient-move {
            to { background-position: 200% center; }
        }

        /* 4. Background & Spotlight */
        #hero-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #spotlight {
            position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,100,0,0.08) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%; pointer-events: none; z-index: 5;
            transform: translate(-50%, -50%); transition: 0.1s;
        }

        .hero-content { position: relative; z-index: 10; }
        
        /* 5. Magnetic Button Wrap */
        .magnetic-wrap { display: inline-block; transition: transform 0.2s ease-out; }

        .swiper { width: 100%; max-width: 600px; height: 450px; border-radius: 20px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; }
    </style>
</head>
<body>

    <div id="loader">
        <h2 class="text-orange-500 font-black text-2xl tracking-[0.3em] uppercase mb-4">Ahmad Bandar</h2>
        <div class="w-48 h-1 bg-zinc-900 rounded-full overflow-hidden">
            <div id="loader-bar" class="bg-orange-600 h-full w-0 transition-all duration-300"></div>
        </div>
    </div>

    <div id="spotlight"></div>

    <a href="https://wa.me/96181101811" target="_blank" class="fixed bottom-6 right-6 z-[100] bg-green-600 p-4 rounded-full shadow-2xl hover:scale-110 transition duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.556 5.332-11.888 11.888-11.888 3.176 0 6.161 1.237 8.404 3.48s3.481 5.229 3.481 8.406c0 6.556-5.333 11.888-11.889 11.888-2.013 0-3.991-.512-5.747-1.483l-6.236 1.706zm6.376-3.791c1.512.897 3.011 1.346 4.637 1.346 5.409 0 9.811-4.402 9.811-9.811 0-2.622-1.021-5.087-2.875-6.941s-4.32-2.875-6.941-2.875c-5.41 0-9.811 4.402-9.811 9.811 0 1.741.463 3.082 1.336 4.549l-.985 3.597 3.688-.976z"/></svg>
    </a>

    <section class="h-screen flex flex-col justify-center items-center bg-black text-center p-5 relative overflow-hidden">
        <canvas id="hero-canvas"></canvas>
        <div class="hero-content">
            <h1 data-aos="zoom-in" class="text-7xl md:text-9xl font-black mb-4 italic tracking-tighter uppercase text-white leading-none">
                Ahmad <br> <span class="gradient-text">Bandar</span>
            </h1>
            
            <div class="h-8 mb-10">
                <span id="typed" class="text-zinc-500 text-lg md:text-xl tracking-[0.3em] uppercase font-mono"></span>
            </div>

            <div class="flex gap-6 justify-center">
                <div class="magnetic-wrap">
                    <a href="#projects" class="bg-orange-600 text-white font-bold py-4 px-10 rounded-full uppercase text-xs tracking-widest block hover:shadow-[0_0_20px_rgba(249,115,22,0.4)] transition">Explore</a>
                </div>
                <div class="magnetic-wrap">
                    <a href="#gallery" class="border border-zinc-800 text-white font-bold py-4 px-10 rounded-full uppercase text-xs tracking-widest block hover:bg-white hover:text-black transition">Gallery</a>
                </div>
            </div>
        </div>
    </section>

    <section id="projects" class="py-24 px-5 bg-zinc-950">
        <div class="max-w-5xl mx-auto">
            <h2 class="text-3xl font-black text-orange-500 uppercase mb-16 italic tracking-widest">Performance Stats</h2>
            <div class="grid md:grid-cols-2 gap-12">
                <div class="space-y-8">
                    <div>
                        <div class="flex justify-between mb-3 text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500"><span>Python Logic</span><span>85%</span></div>
                        <div class="h-[2px] bg-zinc-900 w-full"><div class="bg-orange-500 h-full w-[85%]"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between mb-3 text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500"><span>Mathematics</span><span>92%</span></div>
                        <div class="h-[2px] bg-zinc-900 w-full"><div class="bg-orange-500 h-full w-[92%]"></div></div>
                    </div>
                </div>
                <div class="space-y-8">
                    <div>
                        <div class="flex justify-between mb-3 text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500"><span>Data Analysis</span><span>80%</span></div>
                        <div class="h-[2px] bg-zinc-900 w-full"><div class="bg-orange-500 h-full w-[80%]"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between mb-3 text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500"><span>On-Field Stamina</span><span>95%</span></div>
                        <div class="h-[2px] bg-zinc-900 w-full"><div class="bg-orange-500 h-full w-[95%]"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="about" class="py-24 px-5 max-w-6xl mx-auto">
        <div class="grid md:grid-cols-2 gap-20 items-center">
            <div data-aos="fade-right">
                <img src="image.png" alt="Ahmad" class="rounded-2xl border border-zinc-800 grayscale hover:grayscale-0 transition duration-700 w-full shadow-2xl">
            </div>
            <div data-aos="fade-left">
                <h2 class="text-6xl font-black uppercase italic text-white mb-8">Creative <span class="text-orange-500">Drive.</span></h2>
                <p class="text-zinc-500 text-xl leading-relaxed">Born in 2007. Data Science student at USJ. I thrive where logic meets physical performance.</p>
            </div>
        </div>
    </section>

    <section id="gallery" class="py-24 px-5 bg-zinc-950">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="image_3e687a.jpg"></div>
                <div class="swiper-slide"><img src="image_3e68f8.jpg"></div>
                <div class="swiper-slide"><img src="image_3e6fc0.jpg"></div>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center border-t border-zinc-900">
        <a href="https://instagram.com/ahmad.bandar.5203" target="_blank" class="text-[10px] font-black tracking-[0.5em] uppercase text-zinc-600 hover:text-orange-500 transition">Instagram / @ahmad.bandar.5203</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    
    <script>
        AOS.init({ duration: 1000, once: true });

        // Loader
        let progress = 0;
        const interval = setInterval(() => {
            progress += 10;
            document.getElementById('loader-bar').style.width = progress + '%';
            if (progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
                }, 400);
            }
        }, 100);

        // Typed
        new Typed('#typed', {
            strings: ['Data Science @ USJ', 'Midfielder', 'Tech Enthusiast'],
            typeSpeed: 60, backSpeed: 40, loop: true
        });

        // Spotlight
        const spotlight = document.getElementById('spotlight');
        document.addEventListener('mousemove', (e) => {
            spotlight.style.left = e.clientX + 'px';
            spotlight.style.top = e.clientY + 'px';
        });

        // Magnetic Effect
        const magnets = document.querySelectorAll('.magnetic-wrap');
        magnets.forEach((m) => {
            m.addEventListener('mousemove', (e) => {
                const rect = m.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                m.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
            });
            m.addEventListener('mouseleave', () => { m.style.transform = 'translate(0,0)'; });
        });

        // Swiper
        new Swiper(".mySwiper", { 
            effect: "coverflow", centeredSlides: true, slidesPerView: "auto", loop: true, autoplay: { delay: 2000 }
        });

        // Particles
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if(this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if(this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(249, 115, 22, 0.3)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function init() { for (let i = 0; i < 60; i++) particles.push(new Particle()); }
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        init(); animate();
    </script>
</body>
</html>
