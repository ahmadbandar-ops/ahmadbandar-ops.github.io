<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Bandar | Digital Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap');
        
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; cursor: none; }

        /* Bento Grid Container */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 180px);
            gap: 15px;
            max-width: 1100px;
            margin: 100px auto;
            padding: 20px;
        }

        .bento-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .bento-item:hover {
            border-color: #f97316;
            background: rgba(249, 115, 22, 0.05);
            transform: translateY(-5px);
        }

        /* Specific Sizes for Bento */
        .item-large { grid-column: span 2; grid-row: span 2; }
        .item-wide { grid-column: span 2; }
        .item-tall { grid-row: span 2; }

        #custom-cursor { position: fixed; width: 8px; height: 8px; background: #f97316; border-radius: 50%; pointer-events: none; z-index: 10000; mix-blend-mode: difference; }

        .orange-glow { box-shadow: 0 0 40px rgba(249, 115, 22, 0.2); }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <div class="bento-grid" id="main-dashboard">
        
        <div class="bento-item item-large flex flex-col justify-end orange-glow">
            <h1 class="text-4xl font-black uppercase tracking-tighter">Ahmad <br> <span class="text-orange-500">Bandar</span></h1>
            <p class="text-[10px] text-zinc-500 mt-2 tracking-widest uppercase font-bold">Data Scientist & Midfield Strategist</p>
        </div>

        <div class="bento-item item-tall flex justify-center items-center">
            <img src="ahmad-cutout.png..jpg" class="w-full h-full object-cover opacity-80 hover:opacity-100 transition" alt="Ahmad">
        </div>

        <div class="bento-item flex flex-col justify-center">
            <span class="text-orange-500 font-black text-2xl tracking-tighter">98.2%</span>
            <p class="text-[9px] text-zinc-500 uppercase font-bold">Logic Accuracy</p>
        </div>

        <div class="bento-item flex flex-col justify-center border-orange-500/40">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-black uppercase tracking-widest">Live Protocol</span>
            </div>
            <p class="text-[9px] text-zinc-500 mt-1">System Authorized</p>
        </div>

        <div class="bento-item item-wide">
            <h3 class="text-xs font-black uppercase tracking-[0.3em] mb-4 text-orange-500">Active Projects</h3>
            <div class="space-y-3">
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="text-[11px] font-bold">Neural Scout AI</span>
                    <span class="text-[10px] text-zinc-600 tracking-tighter italic">In Development</span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="text-[11px] font-bold">Tactical Heatmap API</span>
                    <span class="text-[10px] text-zinc-600 tracking-tighter italic">Live</span>
                </div>
            </div>
        </div>

        <div class="bento-item item-large bg-zinc-950 overflow-hidden">
             <div class="flex justify-between items-center mb-4">
                 <span class="text-[10px] font-black uppercase tracking-widest text-orange-500">Spatial Intelligence</span>
                 <span class="text-[8px] text-zinc-600">INTEL_V.01</span>
             </div>
             <div class="w-full h-full border border-zinc-800 rounded relative">
                <div class="absolute left-1/2 h-full w-[1px] bg-zinc-800"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-12 h-12 border border-zinc-800 rounded-full"></div>
                <div class="absolute top-1/4 left-1/2 w-6 h-6 bg-orange-500/20 blur-md rounded-full"></div>
             </div>
        </div>
        

        <div class="bento-item flex items-center justify-center hover:bg-orange-500 group">
            <a href="https://api.whatsapp.com/send?phone=96181101811" target="_blank" class="text-[10px] font-black uppercase tracking-widest group-hover:text-black transition">WhatsApp</a>
        </div>

        <div class="bento-item flex items-center justify-center">
            <div class="flex gap-2">
                <span class="text-[10px] font-black text-zinc-400">PY</span>
                <span class="text-[10px] font-black text-zinc-400">SQL</span>
                <span class="text-[10px] font-black text-zinc-400">AI</span>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('mousemove', (e) => {
            const cursor = document.getElementById('custom-cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
