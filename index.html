<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Bandar | Future Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@900&display=swap');
        
        body { background-color: #000; color: white; scroll-behavior: smooth; font-family: 'Inter', sans-serif; overflow-x: hidden; cursor: none; }

        /* Modern Line Follower (El-Khat yalle bel7aq el-mouse) */
        #mouse-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }

        /* The New Floating Labels (Badal el-Terminal Box) */
        .glass-tag {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(249, 115, 22, 0.3);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #f97316;
            display: inline-block;
            margin: 5px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .gradient-text {
            background: linear-gradient(180deg, #fff 30%, #f97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #custom-cursor {
            position: fixed; width: 12px; height: 12px; background: #f97316;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            transition: transform 0.1s; transform: translate(-50%, -50%);
        }

        #loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    <svg id="mouse-line"><line id="line" x1="0" y1="0" x2="0" y2="0" stroke="#f97316" stroke-width="0.5" stroke-dasharray="4" opacity="0.4" /></svg>

    <div id="loader">
        <h2 style="font-family: 'Syncopate'" class="text-orange-500 font-bold text-xl tracking-[0.5em]">LOADING SYSTEM</h2>
    </div>

    <section class="h-screen flex flex-col justify-center items-center relative">
        <div class="text-center z-10">
            <h1 data-aos="fade-down" class="text-8xl md:text-[11rem] font-black uppercase leading-none tracking-tighter">
                AHMAD <br> <span class="gradient-text">BANDAR</span>
            </h1>
            
            <div class="mt-8 flex flex-wrap justify-center gap-4 max-w-xl mx-auto">
                <div class="glass-tag" style="animation-delay: 0s;">Data Scientist</div>
                <div class="glass-tag" style="animation-delay: 0.5s;">Midfield Strategist</div>
                <div class="glass-tag" style="animation-delay: 1s;">AI Enthusiast</div>
                <div class="glass-tag" style="animation-delay: 1.5s;">Logic Protocol</div>
            </div>

            <div class="mt-12">
                <a href="https://wa.me/96181101811" class="group relative px-12 py-4 font-black text-[10px] tracking-[0.3em] uppercase">
                    <span class="absolute inset-0 border border-zinc-800 group-hover:border-orange-500 transition-colors"></span>
                    CONTACT OPERATOR
                </a>
            </div>
        </div>
    </section>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        
        const cursor = document.getElementById('custom-cursor');
        const line = document.getElementById('line');
        const title = document.querySelector('h1');

        document.addEventListener('mousemove', (e) => {
            // Cursor Follow
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';

            // Geometric Line (Khat bel7aq el-mouse mn nos el-shishe)
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            line.setAttribute('x1', centerX);
            line.setAttribute('y1', centerY);
            line.setAttribute('x2', e.clientX);
            line.setAttribute('y2', e.clientY);

            // Subtle Tilt for the whole header
            const xVal = (e.clientX - centerX) / 50;
            const yVal = (e.clientY - centerY) / 50;
            title.style.transform = `rotateX(${-yVal}deg) rotateY(${xVal}deg)`;
        });

        // Simple Loader
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 1000);
        });
    </script>
</body>
</html>
