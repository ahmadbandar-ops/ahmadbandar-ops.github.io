<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Bandar | Future Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@400;900&display=swap');
        
        body { background-color: #000; color: white; scroll-behavior: smooth; font-family: 'Inter', sans-serif; overflow-x: hidden; cursor: none; }

        /* Smooth Cursor & Line */
        #custom-cursor { position: fixed; width: 12px; height: 12px; background: #f97316; border-radius: 50%; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); transition: transform 0.1s ease-out; }
        #mouse-line { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* Floating Tags Style */
        .glass-tag {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(249, 115, 22, 0.3);
            backdrop-filter: blur(10px); padding: 8px 20px; border-radius: 100px;
            font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: #f97316;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

        /* Smooth 3D Transition for Image */
        #tilt-card {
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); /* Hayde kirmel el-sora tet-7arrak shway shway */
            transform-style: preserve-3d;
        }

        .gradient-text { background: linear-gradient(180deg, #fff 30%, #f97316 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .contact-btn {
            border: 1px solid rgba(249, 115, 22, 0.2); transition: all 0.4s ease;
        }
        .contact-btn:hover { background: #f97316; color: black; border-color: #f97316; box-shadow: 0 0 30px rgba(249, 115, 22, 0.4); }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    <svg id="mouse-line"><line id="line" x1="0" y1="0" x2="0" y2="0" stroke="#f97316" stroke-width="0.5" stroke-dasharray="4" opacity="0.3" /></svg>

    <div id="loader">
        <h2 style="font-family: 'Syncopate'" class="text-orange-500 font-bold text-xl tracking-[0.5em]">SYSTEM ONLINE</h2>
    </div>

    <section class="h-screen flex flex-col justify-center items-center relative border-b border-zinc-900">
        <div class="text-center z-10">
            <h1 data-aos="fade-down" class="text-8xl md:text-[11rem] font-black uppercase leading-none tracking-tighter">
                AHMAD <br> <span class="gradient-text">BANDAR</span>
            </h1>
            <div class="mt-8 flex flex-wrap justify-center gap-4">
                <div class="glass-tag">Data Scientist</div>
                <div class="glass-tag" style="animation-delay: 0.5s;">Midfield Strategist</div>
            </div>
        </div>
    </section>

    <section class="py-32 flex flex-col items-center bg-zinc-950">
        <h2 class="text-zinc-800 font-black text-6xl uppercase tracking-tighter mb-10 opacity-20">Identity</h2>
        <div class="relative max-w-sm" id="tilt-card" data-aos="zoom-in">
            <img src="image.png" alt="Ahmad" class="rounded-2xl border border-zinc-800 grayscale hover:grayscale-0 transition duration-1000">
            <div class="absolute -bottom-6 -right-6 bg-orange-600 p-8 rounded-xl font-black text-black text-[10px] uppercase tracking-widest shadow-2xl">
                EST. 2007 / AHB
            </div>
        </div>
    </section>

    <section id="contact" class="py-40 bg-black text-center relative overflow-hidden">
        <div data-aos="fade-up">
            <h2 class="text-orange-500 font-black text-xs tracking-[1em] uppercase mb-4">Transmission</h2>
            <h3 class="text-5xl md:text-7xl font-black uppercase mb-12">Let's Connect</h3>
            
            <div class="flex flex-col md:flex-row justify-center gap-6 px-10">
                <a href="https://wa.me/96181101811" target="_blank" class="contact-btn px-10 py-5 rounded-full font-black text-[10px] tracking-widest uppercase">
                    WhatsApp Protocol
                </a>
                <a href="https://instagram.com/ahmad.bandar.5203" target="_blank" class="contact-btn px-10 py-5 rounded-full font-black text-[10px] tracking-widest uppercase">
                    Instagram Access
                </a>
                <a href="mailto:ahmad.bandar@example.com" class="contact-btn px-10 py-5 rounded-full font-black text-[10px] tracking-widest uppercase">
                    Secure Email
                </a>
            </div>
        </div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-orange-600/5 rounded-full blur-[120px] -z-10"></div>
    </section>

    <footer class="py-10 text-center border-t border-zinc-900">
        <p class="text-[9px] font-black tracking-[1.5em] text-zinc-800 uppercase">Ahmad Bandar © 2026</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        
        const cursor = document.getElementById('custom-cursor');
        const line = document.getElementById('line');
        const card = document.getElementById('tilt-card');

        document.addEventListener('mousemove', (e) => {
            // Cursor & Line
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            line.setAttribute('x1', window.innerWidth / 2);
            line.setAttribute('y1', window.innerHeight / 2);
            line.setAttribute('x2', e.clientX);
            line.setAttribute('y2', e.clientY);

            // SMOOTH 3D TILT LOGIC
            const r = card.getBoundingClientRect();
            const centerX = r.left + r.width / 2;
            const centerY = r.top + r.height / 2;
            
            // Calculate distance from mouse to center of the image
            const x = (e.clientX - centerX) / (window.innerWidth / 2);
            const y = (e.clientY - centerY) / (window.innerHeight / 2);

            // Limit the tilt and make it smooth with the CSS transition
            card.style.transform = `perspective(1000px) rotateY(${x * 15}deg) rotateX(${-y * 15}deg) scale(1.02)`;
        });

        // Reset tilt when mouse leaves
        document.addEventListener('mouseleave', () => {
            card.style.transform = `perspective(1000px) rotateY(0deg) rotateX(0deg) scale(1)`;
        });

        window.addEventListener('load', () => setTimeout(() => document.getElementById('loader').style.display = 'none', 1000));
    </script>
</body>
</html>
