    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background-color: #000; color: white; scroll-behavior: smooth; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Custom Loader */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease-out;
        }

        /* 3D Canvas & Spotlight */
        #hero-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #spotlight {
            position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,100,0,0.1) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%; pointer-events: none; z-index: 5;
            transform: translate(-50%, -50%); transition: 0.1s;
        }

        .hero-content { position: relative; z-index: 10; }
        .glass-card { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 100, 0, 0.1); }
        
        @keyframes breathing {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 100, 0, 0.2); border-color: rgba(255, 100, 0, 0.2); }
            50% { box-shadow: 0 0 35px rgba(255, 100, 0, 0.5); border-color: rgba(255, 100, 0, 0.5); }
        }
        .animate-glow { animation: breathing 3s ease-in-out infinite; }
        
        .swiper { width: 100%; max-width: 600px; height: 450px; border-radius: 20px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; }
        
        /* Typed Cursor Style */
        .typed-cursor { color: #f97316; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="spotlight"></div>

        <div class="swiper mySwiper">

                <div class="swiper-slide"><img src="image_3e687a.jpg"></div>

    <footer class="py-10 text-center border-t border-zinc-900">
        <a href="https://instagram.com/ahmad.bandar.5203" target="_blank" class="text-orange-500 font-bold tracking-widest uppercase hover:text-white transition">@ahmad.bandar.5203</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    
    <script>
        AOS.init({ duration: 1000, once: true });

        // Loader
        let progress = 0;
        const bar = document.getElementById('loader-bar');
        const text = document.getElementById('loader-text');
        const interval = setInterval(() => {
            progress += Math.random() * 15;
            if (progress >= 100) {
                progress = 100; clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
                }, 500);
            }
            bar.style.width = progress + '%';
            text.innerText = Math.floor(progress) + '%';
        }, 100);

        // Typed Effect
        new Typed('#typed', {
            strings: ['Data Science @ USJ', 'Midfield Maestro', 'Logic & Code Enthusiast'],
            typeSpeed: 50, backSpeed: 30, loop: true
        });

        // Spotlight
        const spotlight = document.getElementById('spotlight');
        document.addEventListener('mousemove', (e) => {
            spotlight.style.left = e.clientX + 'px';
            spotlight.style.top = e.clientY + 'px';
        });

        // Swiper
        new Swiper(".mySwiper", { 
            effect: "coverflow", centeredSlides: true, slidesPerView: "auto", loop: true, autoplay: { delay: 2500 },
            pagination: { el: ".swiper-pagination" } 
        });

        // 3D Particles
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if(this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if(this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 100, 0, 0.4)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function init() { for (let i = 0; i < 80; i++) particles.push(new Particle()); }
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        init(); animate();
    </script>
</body>
