<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad Bandar | Future Vision</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background-color: #000; color: white; scroll-behavior: smooth; font-family: 'Inter', sans-serif; overflow-x: hidden; cursor: none; }
        
        /* 1. Custom Mouse Follower */
        #cursor-follower {
            position: fixed; width: 100px; height: 100px; border: 1px solid rgba(249, 115, 22, 0.3);
            border-radius: 50%; pointer-events: none; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.15s ease-out; transform: translate(-50%, -50%);
        }
        #cursor-follower span { font-size: 7px; color: #f97316; font-weight: 900; animation: spin 8s linear infinite; letter-spacing: 2px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 2. Noise Texture Overlay */
        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.04; pointer-events: none; z-index: 9998;
        }

        /* 3. Digital Glitch Effect */
        .glitch:hover {
            animation: glitch-anim 0.2s cubic-bezier(.25,.46,.45,.94) both infinite;
            text-shadow: 3px 0 #ff00c1, -3px 0 #00fff9;
        }
        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        /* Custom Scrollbar & Progress */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #f97316; }
        #progress-bar { position: fixed; top: 38px; left: 0; height: 2px; background: #f97316; width: 0%; z-index: 100; transition: width 0.1s; }

        /* Other Styles */
        #loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s; }
        .gradient-text { background: linear-gradient(90deg, #fff, #f97316, #fff); background-size: 200% auto; color: transparent; -webkit-background-clip: text; animation: gradient-move 3s linear infinite; }
        @keyframes gradient-move { to { background-position: 200% center; } }
        .ticker-wrap { background: #080808; padding: 12px 0; border-bottom: 1px solid #111; overflow: hidden; }
        .ticker { display: flex; white-space: nowrap; animation: ticker-move 25s linear infinite; }
        .ticker span { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 5px; color: #333; padding-right: 60px; }
        @keyframes ticker-move { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        #hero-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.3; }
        #spotlight { position: fixed; width: 400px; height: 400px; background: radial-gradient(circle, rgba(255,100,0,0.05) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; pointer-events: none; z-index: 5; transform: translate(-50%, -50%); transition: 0.1s; }
        .tilt-box { transition: transform 0.2s ease-out; transform-style: preserve-3d; }
        .magnetic-wrap { display: inline-block; transition: transform 0.3s; }
        .swiper { width: 100%; max-width: 600px; height: 450px; border-radius: 20px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; }
    </style>
</head>
<body>

    <div id="cursor-follower"><span>EXPLORE • STRATEGY • LOGIC • </span></div>

    <div class="noise"></div>

    <div id="loader">
        <h2 class="text-orange-500 font-black text-2xl tracking-[0.4em] uppercase mb-4">Ahmad Bandar</h2>
        <div class="w-40 h-[1px] bg-zinc-900 overflow-hidden"><div id="loader-bar" class="bg-orange-600 h-full w-0 transition-all duration-300"></div></div>
    </div>

    <div id="progress-bar"></div>

    <div id="spotlight"></div>

    <div class="ticker-wrap fixed top-0 w-full z-50">
        <div class="ticker">
            <span>Data Science @ USJ</span> <span>Professional Midfielder</span> <span>Logic Enthusiast</span> <span>Ahmad Bandar</span>
            <span>Data Science @ USJ</span> <span>Professional Midfielder</span> <span>Logic Enthusiast</span> <span>Ahmad Bandar</span>
        </div>
    </div>

    <section class="h-screen flex flex-col justify-center items-center bg-black text-center p-5 relative overflow-hidden">
        <canvas id="hero-canvas"></canvas>
        <div class="hero-content relative z-10">
            <h1 data-aos="zoom-in" class="glitch text-7xl md:text-[10rem] font-black italic uppercase leading-none text-white tracking-tighter">
                Ahmad <br> <span class="gradient-text">Bandar</span>
            </h1>
            <div class="h-8 mt-6 mb-12">
                <span id="typed" class="text-zinc-600 text-xs md:text-sm tracking-[0.5em] uppercase font-mono"></span>
            </div>
            <div class="flex gap-6 justify-center">
                <div class="magnetic-wrap"><a href="#projects" class="bg-white text-black font-black py-4 px-10 rounded-full uppercase text-[10px] tracking-widest hover:bg-orange-600 hover:text-white transition-all block shadow-2xl">Discover</a></div>
                <div class="magnetic-wrap"><a href="https://wa.me/96181101811" target="_blank" class="border border-zinc-800 text-white font-black py-4 px-10 rounded-full uppercase text-[10px] tracking-widest hover:border-orange-500 transition-all block">Protocol</a></div>
            </div>
        </div>
    </section>

    <section id="about" class="py-32 px-5 max-w-6xl mx-auto flex flex-col items-center">
        <div class="tilt-box relative max-w-sm" id="tilt-card" data-aos="zoom-in">
            <img src="image.png" alt="Ahmad Profile" class="rounded-lg shadow-2xl border border-zinc-900 grayscale hover:grayscale-0 transition duration-1000 shadow-orange-900/20">
            <div class="absolute -bottom-6 -right-6 bg-orange-600 p-8 rounded-lg font-black text-black text-[10px] uppercase tracking-[0.3em] shadow-2xl">Access: 2007-X</div>
        </div>
    </section>

    <section id="gallery" class="py-32 px-5 bg-zinc-950 border-t border-zinc-900">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="image_3e687a.jpg"></div>
                <div class="swiper-slide"><img src="image_3e68f8.jpg"></div>
                <div class="swiper-slide"><img src="image_3e6fc0.jpg"></div>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center border-t border-zinc-900">
        <a href="https://instagram.com/ahmad.bandar.5203" target="_blank" class="text-[9px] font-black tracking-[1.5em] uppercase text-zinc-800 hover:text-orange-500 transition-all">TERMINAL / AHB-07</a>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <script>
        AOS.init({ duration: 1000, once: true });

        // MOUSE FOLLOWER
        const follower = document.getElementById('cursor-follower');
        document.addEventListener('mousemove', (e) => {
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
        });

        // PROGRESS BAR
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        };

        // LOADER
        let prg = 0; const int = setInterval(() => { prg += 10; document.getElementById('loader-bar').style.width = prg + '%'; if(prg>=100){ clearInterval(int); setTimeout(()=> {document.getElementById('loader').style.opacity='0'; setTimeout(()=>document.getElementById('loader').style.display='none', 800);}, 400);}}, 60);

        // TYPED
        new Typed('#typed', { strings: ['Solving Logic at USJ', 'Mastering the Pitch', 'Digital Architecture'], typeSpeed: 40, loop: true });

        // SPOTLIGHT
        const spot = document.getElementById('spotlight');
        document.addEventListener('mousemove', (e) => { spot.style.left = e.clientX + 'px'; spot.style.top = e.clientY + 'px'; });

        // MAGNETIC
        document.querySelectorAll('.magnetic-wrap').forEach(m => {
            m.addEventListener('mousemove', (e) => {
                const r = m.getBoundingClientRect();
                m.style.transform = `translate(${(e.clientX - r.left - r.width/2)*0.5}px, ${(e.clientY - r.top - r.height/2)*0.5}px)`;
            });
            m.addEventListener('mouseleave', () => m.style.transform = '');
        });

        // 3D TILT
        const card = document.getElementById('tilt-card');
        card.addEventListener('mousemove', (e) => {
            const r = card.getBoundingClientRect();
            const x = (e.clientX - r.left) / r.width - 0.5;
            const y = (e.clientY - r.top) / r.height - 0.5;
            card.style.transform = `perspective(1000px) rotateY(${x * 30}deg) rotateX(${y * -30}deg) scale(1.05)`;
        });
        card.addEventListener('mouseleave', () => card.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg) scale(1)');

        // SWIPER
        new Swiper(".mySwiper", { effect: "coverflow", centeredSlides: true, slidesPerView: "auto", loop: true, autoplay: { delay: 3000 } });

        // PARTICLES
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5; this.speedX = Math.random() * 0.4 - 0.2; this.speedY = Math.random() * 0.4 - 0.2;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if(this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if(this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
            draw() { ctx.fillStyle = 'rgba(249, 115, 22, 0.4)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        function init() { for (let i = 0; i < 50; i++) particles.push(new Particle()); }
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        init(); animate();
    </script>
</body>
</html>
